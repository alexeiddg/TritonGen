# Shared experiment configuration
# Override per-cluster using cluster-specific YAML if needed.

# --- Model ---
model:
  development: "Qwen/Qwen2.5-Coder-7B-Instruct-AWQ"
  thesis: "Qwen/Qwen2.5-Coder-32B-Instruct"
  secondary: "deepseek-ai/DeepSeek-Coder-V2-Instruct"

# --- Generation ---
generation:
  temperature: 0.2
  # Raised to avoid budget-exhaustion confound for full launcher + kernel generations.
  max_new_tokens: 1536
  n_runs: 20            # paper scale per (kernel_class x condition x dtype) cell

# --- Scale tiers ---
# Source of truth: .contracts/research/scale_policy.md
scale:
  default_tier: "smoke"
  tiers:
    smoke:
      kernel_count: 1
      sample_size: 1
      model_key: "development"
      claim_status: "infrastructure_pass_fail_only"
    development:
      kernel_count: 3
      sample_size_min: 3
      sample_size_max: 5
      model_key: "development"
      claim_status: "directional_indicators_only"
    paper:
      kernel_count_min: 6
      kernel_count_max: 9
      sample_size: 20
      model_key: "thesis"
      optional_secondary_model_key: "secondary"
      claim_status: "reportable_paper_evidence"

# --- Dataset ---
dataset:
  id: "ScalingIntelligence/KernelBench"
  split: "train"
  level: 1

# --- Dtypes tested per kernel ---
dtypes: ["fp32", "fp16", "bf16"]

# --- Kernel classes ---
kernel_classes: ["elementwise", "reduction", "matmul"]

# --- Hardware ---
hardware:
  smem_limit_bytes: 49152    # 48KB — A100 / H100 shared memory default
  target_gpu: "A100"

# --- Statistical reporting ---
stats:
  pass_at_k: [1, 5, 10]
